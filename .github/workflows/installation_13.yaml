name: Tests on Postgres installation

on: [push]

jobs:
  run-feature-tests-pg:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup the PGDG APT repo on Linux
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -

      - name: Install platform dependencies on Linux
        run: |
          sudo apt update
          sudo apt install -y libpq-dev libffi-dev libssl-dev libkrb5-dev zlib1g-dev postgresql-13 postgresql-13-pldebugger pgagent

      - name: Verify PostgreSQL 13 installation
        run: |
          # Checking installed packages to ensure PostgreSQL 13 is installed
          sudo apt list --installed | grep postgresql
          # Verify the existence of directories
          sudo ls -la /etc/postgresql/
          sudo ls -la /etc/postgresql/13/
          sudo ls -la /etc/postgresql/13/main/

      - name: Start PostgreSQL 13 on Linux
        run: |
          # Verify PostgreSQL directories and attempt to start it
          sudo ls -la /etc/postgresql/
          sudo ls -la /etc/postgresql/13/main/
          sudo su - postgres -c "/usr/lib/postgresql/13/bin/postgres -D /var/lib/postgresql/13/main -c config_file=/etc/postgresql/13/main/postgresql.conf &"
          until sudo runuser -l postgres -c "pg_isready -p 5913" 2>/dev/null; do
            >&2 echo "Postgres is unavailable - sleeping for 2 seconds"
            sleep 2
          done
