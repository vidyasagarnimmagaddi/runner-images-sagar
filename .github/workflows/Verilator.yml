name: Install Verilator

on: [push]

jobs:
  install-verilator:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ubuntu-version: [20.04, 22.04, 24.04, latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Ubuntu
        run: |
          echo "Setting up Ubuntu ${{ matrix.ubuntu-version }}"
          sudo apt-get update -y

      - name: Install dependencies
        run: |
          sudo apt-get install -y git make g++ flex bison

      - name: Download Verilator
        run: |
          echo "Downloading Verilator version 5.029"
          wget https://github.com/verilator/verilator/archive/refs/tags/v5.029.tar.gz
          tar -xzf v5.029.tar.gz
          cd verilator-5.029
          git submodule update --init

      - name: Build and install Verilator
        run: |
          cd verilator-5.029
          make
          sudo make install

      - name: Verify installation
        run: |
          verilator --version
