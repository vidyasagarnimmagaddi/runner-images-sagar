name: Install Verilator

on: [push]

jobs:
  install-verilator:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ubuntu-version: [20.04, 22.04, 24.04, latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ubuntu
        run: |
          echo "Setting up Ubuntu ${{ matrix.ubuntu-version }}"
          sudo apt-get update -y

      - name: Install Verilator
        run: |
          echo "Installing Verilator on Ubuntu ${{ matrix.ubuntu-version }}"
          sudo apt-get install -y verilator

      - name: Verify installation
        run: |
          verilator --version
