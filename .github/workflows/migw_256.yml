name: Download and Verify MinGW

on: [push]

jobs:
  build:
    runs-on: windows-2019

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download MinGW
      run: |
        Invoke-WebRequest -Uri "https://sourceforge.net/projects/mingw-w64/files/Toolchains%20targetting%20Win32/Personal%20Builds/mingw-builds/8.1.0/threads-posix/dwarf/i686-8.1.0-release-posix-dwarf-rt_v6-rev0.7z/download" -OutFile "mingw.7z"

    - name: Install 7-Zip
      run: |
        choco install 7zip -y

    - name: Extract MinGW
      run: |
        7z x mingw.7z -o"mingw"

    - name: Navigate to bin and compute SHA256
      run: |
        cd "mingw/bin"
        $sha256 = Get-FileHash mingw32-make.exe -Algorithm SHA256 | Select-Object -ExpandProperty Hash
        Write-Output $sha256.ToLower()
