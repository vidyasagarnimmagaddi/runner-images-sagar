name: Install Simulator Dependencies

on: [push]

jobs:
  install-on-ubuntu-latest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Simulator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

  install-on-ubuntu-2204:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Simulator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

  install-on-ubuntu-2404:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Simulator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
