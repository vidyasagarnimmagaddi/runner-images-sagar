name: Check glibc Versionsssss

on:

  push

jobs:
  check_glibc_version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (if needed)
        uses: actions/checkout@v3
        
      - name: Set up Docker container and check glibc version
        run: |
          # Run the container with Python 3.10-slim image
          docker run --rm python:3.10-slim /bin/bash -c "ldd --version"

          # Alternatively, use strings to check glibc version
          docker run --rm python:3.10-slim /bin/bash -c "strings /lib/x86_64-linux-gnu/libc.so.6 | grep GLIBC"
