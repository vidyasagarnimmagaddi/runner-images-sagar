name: Extract EdgeDriver Signature

on:
  push

jobs:
  extract_signature:
    runs-on: windows-latest  # Use Windows runner for signature verification

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Download Latest EdgeDriver
      run: |
        $url = "https://msedgedriver.azureedge.net/LATEST_RELEASE_131_WINDOWS"
        $latest_version = Invoke-RestMethod -Uri $url
        Write-Host "Latest EdgeDriver Version: $latest_version"
        $download_url = "https://msedgedriver.azureedge.net/$latest_version/msedgedriver_$latest_version.zip"
        
        # Download the zip file
        Invoke-WebRequest -Uri $download_url -OutFile "msedgedriver.zip"

    - name: Extract EdgeDriver Zip
      run: |
        # Unzip the file
        Expand-Archive -Path "msedgedriver.zip" -DestinationPath "msedgedriver"
      
    - name: Verify EdgeDriver Signature
      run: |
        # Navigate to the extracted folder
        $msedgedriver_path = "msedgedriver/msedgedriver.exe"

        # Verify the signature of msedgedriver.exe (Windows-specific)
        signtool verify /pa $msedgedriver_path

    - name: Cleanup
      run: |
        Remove-Item -Recurse -Force "msedgedriver"
        Remove-Item -Force "msedgedriver.zip"
