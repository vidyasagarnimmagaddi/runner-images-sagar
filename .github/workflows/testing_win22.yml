name: Get File Thumbprint

on:
  push

jobs:
  thumbprint:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Visual Studio Installer
      run: Invoke-WebRequest -Uri https://aka.ms/vs/17/release/vs_Enterprise.exe -OutFile vs_Enterprise.exe

    - name: Get Signature Thumbprint
      id: get_thumbprint
      run: |
        $filePath = "vs_Enterprise.exe"
        $sig = Get-AuthenticodeSignature -FilePath $filePath
        Write-Output "Signature Thumbprint: $($sig.SignerCertificate.Thumbprint)"
      shell: pwsh
      continue-on-error: true

    - name: Output Thumbprint
      run: |
        $thumbprint = $(Get-Content $env:GITHUB_WORKSPACE/get_thumbprint.txt)
        Write-Output "Signature Thumbprint: $thumbprint"
