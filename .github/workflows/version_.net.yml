name: List .NET Versions

on:
  push

jobs:
  fetch-dotnet-versions:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Update package lists
        run: sudo apt update
      
      - name: List available .NET SDK versions
        run: |
          apt list -a dotnet-sdk
          apt-cache policy dotnet-sdk
