name: Download .NET SDK 8.0

on:
  push

jobs:
  download-dotnet-sdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up .NET SDK versions
        id: setup
        run: |
          dotnet_versions=("8.0") # Adjust if you need multiple versions
          sdks=()

          for version in "${dotnet_versions[@]}"; do
              release_url="https://dotnetcli.blob.core.windows.net/dotnet/release-metadata/${version}/releases.json"
              releases=$(curl -s "$release_url")
              if [[ $version == "6.0" ]]; then
                  sdks=("${sdks[@]}" $(echo "${releases}" | jq -r 'first(.releases[].sdks[]?.version | select(contains("preview") or contains("rc") | not))'))
              else
                  sdks=("${sdks[@]}" $(echo "${releases}" | jq -r '.releases[].sdk.version | select(contains("preview") or contains("rc") | not)'))
                  sdks=("${sdks[@]}" $(echo "${releases}" | jq -r '.releases[].sdks[]?.version | select(contains("preview") or contains("rc") | not)'))
              fi
          done

          sorted_sdks=$(echo "${sdks[@]}" | tr ' ' '\n' | sort -r | uniq -w 5)
          echo "Sorted SDKs: $sorted_sdks"
          
          # Output latest SDK version
          latest_sdk=$(echo "$sorted_sdks" | head -n 1)
          echo "Latest .NET SDK version: $latest_sdk"
          echo "::set-output name=latest_sdk::$latest_sdk"

      - name: Print Latest SDK Version
        run: |
          echo "The latest .NET SDK version is: ${{ steps.setup.outputs.latest_sdk }}"
