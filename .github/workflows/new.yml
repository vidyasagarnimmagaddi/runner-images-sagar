name: Edge WebDriver Setup on Windows

on: [push]

jobs:
  setup:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up PowerShell for script execution
      run: |
        Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope Process
        $ErrorActionPreference = "Stop"  # Make sure any error stops the script

    - name: Download and Extract Microsoft Edge WebDriver
      run: |
        Write-Host "Downloading Microsoft Edge WebDriver..."
        $latestVersion = "131.0.2903.146"  # Specify the version if needed
        $downloadUrl = "https://msedgedriver.azureedge.net/$latestVersion/edgedriver_win64.zip"
        
        # Set the download and extract paths
        $edgeDriverZipPath = "$env:temp\edgedriver_win64.zip"
        $edgeDriverPath = "$env:temp\EdgeDriver"

        # Download the WebDriver
        Invoke-WebRequest -Uri $downloadUrl -OutFile $edgeDriverZipPath

        Write-Host "Extracting Microsoft Edge WebDriver..."
        Expand-Archive -Path $edgeDriverZipPath -DestinationPath $edgeDriverPath

    - name: Validate Microsoft Edge WebDriver Signature
      run: |
        $edgeDriverExecutable = "$env:temp\EdgeDriver\msedgedriver.exe"
        $signatureThumbprint = "YOUR_EXPECTED_THUMBPRINT_HERE"  # Replace with the expected thumbprint

        # Load the necessary PowerShell cmdlets
        $cert = Get-AuthenticodeSignature -FilePath $edgeDriverExecutable

        # Extract and compare thumbprint
        if ($cert.Status -eq 'Valid' -and $cert.SignerCertificate.Thumbprint -eq $signatureThumbprint) {
          Write-Host "Microsoft Edge WebDriver signature is valid."
        } else {
          Write-Host "Invalid or missing signature for Edge WebDriver!"
          exit 1  # Fail the job if the signature is invalid
        }
        
