name: R installation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24

    steps:
    - name: Install R
      run: |
        sudo apt-get update -y
        sudo apt-get install -y r-base
       
    - name: Check R version
      run: R --version
