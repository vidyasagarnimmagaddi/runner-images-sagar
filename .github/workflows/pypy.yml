name: Setup PyPy on Windows

on: [push]

jobs:
  setup-pypy:
    name: Setup PyPy ${{ matrix.pypy }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        pypy:
          - 'pypy-3.10-nightly'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: setup-python ${{ matrix.pypy }}
        id: setup-python
        uses: ./
        with:
          python-version: ${{ matrix.pypy }}

      - name: Verify Python version
        run: python --version
