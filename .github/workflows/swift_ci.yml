name: Swift CI

on:
  push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang libicu-dev curl

    - name: Get Latest Swift Version
      id: swift_version
      run: |
        SWIFT_VERSION=$(curl -s https://swift.org/download/ | grep -oP 'swift-\d+\.\d+\.\d+-RELEASE' | head -1)
        echo "SWIFT_VERSION=${SWIFT_VERSION}" >> $GITHUB_ENV

    - name: Set up Swift
      run: |
        echo "Downloading Swift version: ${{ env.SWIFT_VERSION }}"
        wget https://swift.org/builds/${{ env.SWIFT_VERSION }}/ubuntu20.04/${{ env.SWIFT_VERSION }}.tar.gz
        tar xzf ${{ env.SWIFT_VERSION }}.tar.gz
        echo "/home/runner/${{ env.SWIFT_VERSION }}/usr/bin" >> $GITHUB_PATH

    - name: Verify Swift installation
      run: swift --version

    - name: Build the Swift application
      run: |
        swift package init --type executable
        echo 'import Foundation' > Sources/MySwiftApp/main.swift
        echo 'let amount1 = Decimal(19.99)' >> Sources/MySwiftApp/main.swift
        echo 'let amount2 = Decimal(5.75)' >> Sources/MySwiftApp/main.swift
        echo 'let total = amount1 + amount2' >> Sources/MySwiftApp/main.swift
        echo 'print("Total Amount: \\(total)")' >> Sources/MySwiftApp/main.swift
        swift build

    - name: Run the Swift application
      run: swift run
