name: Install libicu 70

on: [push]

jobs:
  install-libicu:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out the repository
      uses: actions/checkout@v2

    - name: Update package list
      run: sudo apt-get update

    - name: Install specific version of libicu 70
      run: sudo apt-get install -y libicu70=70.1-2ubuntu4 libicu-dev=70.1-2ubuntu4

    - name: Verify libicu installation
      run: dpkg -l | grep libicu
