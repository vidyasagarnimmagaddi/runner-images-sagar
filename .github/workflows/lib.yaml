name: Install libicu

on: [push]

jobs:
  install-libicu:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out the repository
      uses: actions/checkout@v2

    - name: Install libicu
      run: sudo apt-get update && sudo apt-get install -y libicu-dev

    - name: Verify libicu installation
      run: dpkg -s libicu-dev
