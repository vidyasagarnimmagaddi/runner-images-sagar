name: Test Kotlin Tools

on:
  push

jobs:
  kotlin-tools-check:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download and Install Kotlin 2.1.20
      run: |
        $version = "2.1.20"
        $url = "https://github.com/JetBrains/kotlin/releases/download/v$version/kotlin-compiler-$version.zip"
        $zipPath = "$env:RUNNER_TEMP\kotlin.zip"
        $installPath = "C:\tools\kotlin"

        Invoke-WebRequest -Uri $url -OutFile $zipPath
        Expand-Archive -Path $zipPath -DestinationPath $installPath
        $env:PATH += ";$installPath\bin"
        [Environment]::SetEnvironmentVariable("PATH", $env:PATH, [EnvironmentVariableTarget]::Process)

    - name: Install Pester
      run: Install-Module -Name Pester -Force -Scope CurrentUser

    - name: Create and Run Pester Tests
      run: |
        $testScript = @"
Describe 'Kotlin' {
    \$kotlinTools = @(
        @{ Name = 'kotlin'; Command = 'kotlin -version' },
        @{ Name = 'kotlinc'; Command = 'kotlinc -version' },
        @{ Name = 'kotlinc-jvm'; Command = 'kotlinc-jvm -version' },
        @{ Name = 'kotlinc-js'; Command = 'kotlinc-js -help' },
        @{ Name = 'kapt'; Command = 'kapt -Kapt-mode=stubsAndApt -version' }
    )

    It '<Name> is available' -TestCases \$kotlinTools {
        Invoke-Expression \$Command | Should -ReturnZeroExitCode
    }
}
"@
        $testPath = "$env:RUNNER_TEMP\Kotlin.Tests.ps1"
        $testScript | Set-Content -Path $testPath -Encoding UTF8

        Import-Module Pester
        Invoke-Pester -Script $testPath -CI
