name: Kotlin Tools Test

on:
  push

jobs:
  test-kotlin:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download and Install Kotlin
      run: |
        $version = "2.1.21"
        $url = "https://github.com/JetBrains/kotlin/releases/download/v$version/kotlin-compiler-$version.zip"
        $zipPath = "$env:RUNNER_TEMP\kotlin.zip"
        $installPath = "C:\tools\kotlin"

        Invoke-WebRequest -Uri $url -OutFile $zipPath
        Expand-Archive -Path $zipPath -DestinationPath $installPath
        $env:PATH += ";$installPath\bin"
        [Environment]::SetEnvironmentVariable("PATH", $env:PATH, [EnvironmentVariableTarget]::Process)

    - name: Install Pester
      run: Install-Module -Name Pester -Force -Scope CurrentUser

    - name: Run Kotlin Tool Tests
      run: |
        $kotlinPackages = @("kapt", "kotlin", "kotlinc", "kotlinc-js", "kotlinc-jvm")

        Describe "Kotlin" {
            It "<toolName> is available" -TestCases ($kotlinPackages | ForEach-Object { @{ toolName = $_ } }) {
                "$toolName -version" | Should -ReturnZeroExitCode
            }
        }

        Invoke-Pester -CI
