name: Install Latest PHP from Ubuntu Packages

on:
  push

jobs:
  setup-php:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Update package list
        run: sudo apt-get update
      
      - name: Install PHP and extensions
        run: |
          sudo apt-get install -y php php-cli php-common php-mbstring php-xml php-curl php-zip php-intl php-bcmath php-gd php-mysql php-soap php-xmlrpc
      
      - name: Verify PHP Installation
        run: |
          php -v
          php -m
