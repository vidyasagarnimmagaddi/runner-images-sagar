name: Install Clang

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y wget lsb-release software-properties-common jq

      - name: Install Clang
        run: |
          install_clang() {
              local version=$1
              echo "Installing clang-$version..."
              sudo apt-get install -y "clang-$version" "lldb-$version" "lld-$version" "clang-format-$version" "clang-tidy-$version"
          }

          set_default_clang() {
              local version=$1
              echo "Make Clang ${version} default"
              sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-${version} 100
              sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-${version} 100
              sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-${version} 100
              sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-${version} 100
              sudo update-alternatives --install /usr/bin/run-clang-tidy run-clang-tidy /usr/bin/run-clang-tidy-${version} 100
          }

          get_toolset_value() {
              echo "18"  # Placeholder function; replace with actual implementation if needed
          }

          versions=$(get_toolset_value '.clang.versions[]')
          default_clang_version=$(get_toolset_value '.clang.default_version')

          for version in ${versions[*]}; do
              if [[ $version != $default_clang_version ]]; then
                  install_clang $version
              fi
          done

          install_clang $default_clang_version
          set_default_clang $default_clang_version

      - name: Verify Installation
        run: |
          clang --version
