name: Linux Build Workflow for Ubuntu 24.04

on:
  push

jobs:
  linux-build:
    runs-on: ubuntu-24.04
    
    steps:
    # Step to check out the repository
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Step to set up dependencies
    - name: Download Dependencies
      id: step4
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf libtool cmake libglu1-mesa-dev freeglut3-dev mesa-common-dev \
                               libxmu-dev libxi-dev libgl-dev libx11-dev libxft-dev libxext-dev nasm libwayland-dev \
                               libxkbcommon-dev libegl1-mesa-dev libdecor-0-dev libxrandr-dev libxxf86vm-dev \
                               libx11-xcb-dev libxcb-dri2-0-dev libxcb-glx0-dev libxcb-icccm4-dev libxcb-keysyms1-dev \
                               libxcb-randr0-dev python3-jinja2 libltdl-dev

   
